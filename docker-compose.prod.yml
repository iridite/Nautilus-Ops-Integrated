# 生产环境配置 - 使用已发布的镜像
# 使用方法: docker compose -f docker-compose.prod.yml up -d

services:
  mihomo:
    image: metacubex/mihomo:latest
    container_name: mihomo-proxy
    ports:
      - "7890:7890" # HTTP proxy
      - "7891:7891" # SOCKS5 proxy
      - "9090:9090" # API/Dashboard - 仅调试时启用
    volumes:
      - ./config.yaml:/root/.config/mihomo/config.yaml:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
        # 放弃愚蠢的进程匹配，直接向本地 API 发起 HTTP 蜘蛛探测
        test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9090"]
        interval: 10s
        timeout: 3s
        retries: 3
        start_period: 15s
    restart: unless-stopped
    networks:
      - nautilus-network

  nautilus-keltner:
    # 使用已发布的镜像
    image: ${DOCKER_IMAGE:-iridite/nautilus-keltner:latest}

    container_name: nautilus-keltner
    depends_on:
      mihomo:
        condition: service_healthy
    environment:
      - HTTP_PROXY=http://mihomo:7890
      - HTTPS_PROXY=http://mihomo:7890
      - NAUTILUS_ENV=${NAUTILUS_ENV:-sandbox}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=UTC
      # OKX API 凭证（从 .env 读取）
      - OKX_API_KEY=${OKX_API_KEY}
      - OKX_API_SECRET=${OKX_API_SECRET}
      - OKX_API_PASSPHRASE=${OKX_API_PASSPHRASE}
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./logs:/app/logs
      # 如果需要自定义配置，取消注释下面这行
      # - ./config:/app/config:ro
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: "no"
    networks:
      - nautilus-network

networks:
  nautilus-network:
    driver: bridge
